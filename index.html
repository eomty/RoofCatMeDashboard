<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루프캣미 홍대점 · 유입경로 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue-dark:#0C447C;--blue-mid:#185FA5;--blue-light:#378ADD;--blue-pale:#E6F1FB;
    --green-dark:#27500A;--green-pale:#EAF3DE;
    --gray-900:#1a1a18;--gray-700:#444441;--gray-500:#888780;--gray-300:#d3d1c7;--gray-100:#f1efe8;
    --white:#ffffff;--border:rgba(0,0,0,0.08);
    --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
    --nav-h:54px;--sidebar-w:220px;
  }
  body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-100);color:var(--gray-900);font-size:14px;min-height:100vh}
  nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:100}
  .nav-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--gray-900);text-decoration:none}
  .nav-dot{width:8px;height:8px;background:var(--blue-mid);border-radius:50%;flex-shrink:0}
  .nav-divider{width:1px;height:18px;background:var(--border)}
  .nav-tabs{display:flex;gap:4px}
  .nav-tab{padding:5px 14px;border-radius:var(--radius-sm);font-size:13px;border:none;background:transparent;color:var(--gray-500);cursor:pointer;font-family:inherit;transition:all .15s}
  .nav-tab:hover{background:var(--gray-100);color:var(--gray-900)}
  .nav-tab.active{background:var(--blue-pale);color:var(--blue-dark);font-weight:500}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .last-updated{font-size:11px;color:var(--gray-500)}
  .refresh-btn{padding:6px 14px;border-radius:var(--radius-sm);background:var(--blue-mid);color:white;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
  .refresh-btn:hover{background:var(--blue-dark)}
  .layout{display:flex;padding-top:var(--nav-h);min-height:100vh}
  .sidebar{width:var(--sidebar-w);flex-shrink:0;position:fixed;top:var(--nav-h);bottom:0;left:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:16px 12px}
  .sidebar-label{font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;padding:0 8px;margin:16px 0 6px;display:block}
  .sidebar-label:first-child{margin-top:0}
  .month-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--gray-500);transition:all .15s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
  .month-item:hover{background:var(--gray-100);color:var(--gray-900)}
  .month-item.has-data{color:var(--gray-900)}
  .month-item.active{background:var(--blue-pale);color:var(--blue-dark);font-weight:500}
  .month-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--green-pale);color:var(--green-dark)}
  .month-item.active .month-badge{background:var(--blue-mid);color:white}
  .main-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--gray-900);transition:all .15s;margin-bottom:4px;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
  .main-item:hover{background:var(--gray-100)}
  .main-item.active{background:var(--blue-pale);color:var(--blue-dark)}
  .content{margin-left:var(--sidebar-w);flex:1;padding:28px;min-width:0}
  .page-header{margin-bottom:24px}
  .page-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:8px}
  .page-badge.annual{background:var(--blue-pale);color:var(--blue-dark)}
  .page-badge.monthly{background:var(--green-pale);color:var(--green-dark)}
  .page-title{font-size:22px;font-weight:600;margin-bottom:4px}
  .page-sub{font-size:13px;color:var(--gray-500)}
  .month-nav{display:flex;align-items:center;gap:8px;margin-top:12px}
  .month-nav-btn{padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:white;font-size:12px;cursor:pointer;font-family:inherit;color:var(--gray-700);transition:all .15s}
  .month-nav-btn:hover:not(:disabled){background:var(--gray-100)}
  .month-nav-btn:disabled{opacity:.35;cursor:default}
  .month-nav-current{font-size:14px;font-weight:500}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
  .metric-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--border);padding:16px 18px}
  .metric-label{font-size:11px;color:var(--gray-500);margin-bottom:4px}
  .metric-value{font-size:24px;font-weight:600;line-height:1.1;margin-bottom:2px}
  .metric-note{font-size:11px;color:var(--gray-500)}
  .metric-up{color:#3B6D11;font-size:11px}
  .metric-down{color:#E24B4A;font-size:11px}
  .grid{display:grid;gap:16px;margin-bottom:16px}
  .grid-2{grid-template-columns:1fr 1fr}
  .span-2{grid-column:span 2}
  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px 22px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .card-title{font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em}
  .tab-group{display:flex;gap:3px}
  .tab-btn{padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;font-size:12px;cursor:pointer;font-family:inherit;color:var(--gray-500);transition:all .15s}
  .tab-btn:hover{background:var(--gray-100)}
  .tab-btn.active{background:var(--blue-pale);color:var(--blue-dark);border-color:transparent;font-weight:500}
  .bar-list{display:flex;flex-direction:column;gap:8px}
  .bar-row{display:flex;align-items:center;gap:10px}
  .bar-rank{font-size:10px;color:var(--gray-500);width:14px;text-align:right;flex-shrink:0}
  .bar-label{font-size:12px;color:var(--gray-900);width:82px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
  .bar-pct{font-size:12px;color:var(--gray-500);width:38px;text-align:right;flex-shrink:0}
  .bar-cnt{font-size:11px;color:var(--gray-300);width:32px;text-align:right;flex-shrink:0}
  .nat-list{display:flex;flex-direction:column}
  .nat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-100);font-size:12px}
  .nat-row:last-child{border-bottom:none}
  .nat-val{color:var(--gray-500)}
  .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .type-card{background:var(--gray-100);border-radius:var(--radius-sm);padding:12px 14px}
  .type-name{font-size:14px;font-weight:500;margin-bottom:2px}
  .type-pct{font-size:12px;color:var(--gray-500);margin-bottom:6px}
  .type-top{font-size:11px;color:var(--gray-500);line-height:1.5}
  .time-chart{display:flex;align-items:flex-end;gap:4px;height:100px}
  .time-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
  .time-bar-wrap{display:flex;align-items:flex-end;gap:1px;width:100%;justify-content:center}
  .time-lbl{font-size:9px;color:var(--gray-500);text-align:center;line-height:1.3}
  .time-peak{color:#BA7517;font-weight:600}
  .time-legend{display:flex;gap:12px;margin-bottom:8px}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-500)}
  .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
  .insight-list{display:flex;flex-direction:column}
  .insight-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:12px;line-height:1.6;align-items:flex-start}
  .insight-row:last-child{border-bottom:none}
  .insight-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-mid);margin-top:5px;flex-shrink:0}
  .month-calendar{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  .cal-month{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 6px;text-align:center;cursor:pointer;transition:all .15s;background:var(--white)}
  .cal-month:hover.has-data{border-color:var(--blue-light)}
  .cal-month.has-data{border-color:var(--blue-light);background:var(--blue-pale);cursor:pointer}
  .cal-month.no-data{cursor:default;opacity:.4}
  .cal-month-name{font-size:12px;font-weight:500;color:var(--blue-dark)}
  .cal-month.no-data .cal-month-name{color:var(--gray-500)}
  .cal-count{font-size:10px;color:var(--blue-mid);margin-top:2px}
  .loading{display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:12px;color:var(--gray-500)}
  .spinner{width:28px;height:28px;border:3px solid var(--gray-300);border-top-color:var(--blue-mid);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:900px){.sidebar{display:none}.content{margin-left:0;padding:16px}.grid-2{grid-template-columns:1fr}.span-2{grid-column:span 1}.metrics{grid-template-columns:repeat(2,1fr)}.nav-tabs{display:none}}
  @media(max-width:480px){.metrics{grid-template-columns:1fr 1fr}.month-calendar{grid-template-columns:repeat(4,1fr)}}
  .hidden{display:none!important}
  .more-btn{font-size:11px;padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--gray-500);cursor:pointer;font-family:inherit;transition:all .15s}
  .more-btn:hover{background:var(--gray-100);color:var(--gray-900)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.hidden{display:none!important}
  .modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
  .modal-title{font-size:15px;font-weight:600;color:var(--gray-900)}
  .modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--gray-100);color:var(--gray-700);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .modal-close:hover{background:var(--gray-300)}
  .modal-body{overflow-y:auto;padding:16px 22px;flex:1}
  .modal-sub{font-size:11px;color:var(--gray-500);margin-bottom:14px}
  .memo-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
  .memo-filter-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--gray-500);cursor:pointer;font-family:inherit;transition:all .15s}
  .memo-filter-btn:hover{background:var(--gray-100)}
  .memo-filter-btn.active{background:var(--blue-pale);color:var(--blue-dark);border-color:transparent;font-weight:500}
  .memo-feed{display:flex;flex-direction:column;gap:8px}
  .memo-item{background:var(--gray-100);border-radius:var(--radius-md);padding:12px 14px;border-left:3px solid var(--border)}
  .memo-item.cat-workin{border-left-color:#185FA5}
  .memo-item.cat-new{border-left-color:#0F6E56}
  .memo-item.cat-viral{border-left-color:#993556}
  .memo-item.cat-return{border-left-color:#BA7517}
  .memo-item.cat-myeongdong{border-left-color:#888780}
  .memo-item.cat-etc{border-left-color:#d3d1c7}
  .memo-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
  .memo-cat-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
  .memo-cat-badge.cat-workin{background:#E6F1FB;color:#0C447C}
  .memo-cat-badge.cat-new{background:#EAF3DE;color:#27500A}
  .memo-cat-badge.cat-viral{background:#FDEEF3;color:#7A1F3D}
  .memo-cat-badge.cat-return{background:#FAEEDA;color:#7A4A00}
  .memo-cat-badge.cat-myeongdong{background:#f0efe8;color:#555}
  .memo-cat-badge.cat-etc{background:#f0efe8;color:#555}
  .memo-date{font-size:10px;color:var(--gray-500)}
  .memo-meta{font-size:10px;color:var(--gray-500)}
  .memo-text{font-size:13px;color:var(--gray-900);line-height:1.5}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><div class="nav-dot"></div>루프캣미 홍대점</div>
  <div class="nav-divider"></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('annual')">연간 누계</button>
    <button class="nav-tab" onclick="showPage('monthly')">월별 상세</button>
  </div>
  <div class="nav-right">
    <span class="last-updated" id="last-updated"></span>
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <button class="main-item active" id="sidebar-annual" onclick="showPage('annual')">📊 연간 누계</button>
    <span class="sidebar-label">월별 상세</span>
    <div id="sidebar-months"></div>
  </aside>
  <main class="content">
    <div id="page-annual"><div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div></div>
    <div id="page-monthly" class="hidden"></div>
  </main>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-sub" id="modal-sub"></p>
      <div id="modal-content"></div>
    </div>
  </div>
</div>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRixukIJsxMyHEGP6ilnKktBXmmMYfU0NUokXCOprjaFT452pMoJ7YpUTZQKbVOZgLlociJ2TJGkR62/pub?gid=1811913983&single=true&output=csv';
const MONTHS_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const CH_COLORS = {
  '네이버 검색':'#185FA5','네이버 지도':'#185FA5','재방문':'#185FA5','워크인':'#185FA5',
  '인스타(타인)':'#993556','인스타(공식)':'#993556','틱톡':'#0F6E56','샤오홍슈':'#0F6E56',
  '구글 검색':'#888780','구글 지도':'#888780','지인 추천':'#888780','온라인 예매':'#888780','기타':'#C4C2BA'
};
const TIME_HOURS = ['12시','13시','14시','15시','16시','17시','18시','19시','20시'];

let RAW = [];
let MONTHLY = {};
let currentMonth = null;
let currentChTab = {annual:'all', monthly:'all'};
let currentTypeTab = {annual:'all', monthly:'all'};
let chartInstances = {};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const header = lines[0].split(',');
  return lines.slice(1).map(line => {
    const cols = line.split(',');
    const obj = {};
    header.forEach((h,i) => obj[h.trim()] = (cols[i]||'').trim());
    return obj;
  }).filter(r => r['날짜'] && r['채널']);
}

function buildMonthly(rows) {
  const m = {};
  rows.forEach(r => {
    const date = r['날짜'];
    if (!date || !date.match(/\d{4}-\d{2}-\d{2}/)) return;
    const month = parseInt(date.split('-')[1]);
    const year = parseInt(date.split('-')[0]);
    const key = `${year}-${month}`;
    if (!m[key]) m[key] = {year, month, rows:[]};
    m[key].rows.push(r);
  });
  return m;
}

function calcStats(rows) {
  const total = rows.length;
  const domestic = rows.filter(r=>r['구분']==='국내').length;
  const foreign = rows.filter(r=>r['구분']==='국외').length;

  const chAll = {}, chDom = {}, chFor = {};
  rows.forEach(r => {
    const ch = r['채널']; const g = r['구분'];
    chAll[ch] = (chAll[ch]||0)+1;
    if(g==='국내') chDom[ch]=(chDom[ch]||0)+1;
    if(g==='국외') chFor[ch]=(chFor[ch]||0)+1;
  });

  const toArr = (obj,tot) => Object.entries(obj).map(([name,cnt])=>({name,cnt,pct:+(cnt/tot*100).toFixed(1),color:CH_COLORS[name]||'#C4C2BA'})).sort((a,b)=>b.cnt-a.cnt);
  const domTotal = Object.values(chDom).reduce((s,v)=>s+v,0)||1;
  const forTotal = Object.values(chFor).reduce((s,v)=>s+v,0)||1;

  const nat = {};
  rows.forEach(r=>{ const n=r['국가/지역']||'미응답'; nat[n]=(nat[n]||0)+1; });
  const natArr = Object.entries(nat).map(([name,cnt])=>({name,cnt,pct:+(cnt/total*100).toFixed(1)})).sort((a,b)=>b.cnt-a.cnt);

  const types = {all:{커플:0,가족:0,친구:0,'1인':0}, dom:{커플:0,가족:0,친구:0,'1인':0}, for:{커플:0,가족:0,친구:0,'1인':0}};
  const typeCh = {all:{}, dom:{}, for:{}};
  rows.forEach(r => {
    const t = r['그룹유형']; const g = r['구분']; const ch = r['채널'];
    if(!['커플','가족','친구','1인'].includes(t)) return;
    types.all[t]=(types.all[t]||0)+1;
    if(!typeCh.all[t]) typeCh.all[t]={};
    typeCh.all[t][ch]=(typeCh.all[t][ch]||0)+1;
    if(g==='국내'){
      types.dom[t]=(types.dom[t]||0)+1;
      if(!typeCh.dom[t]) typeCh.dom[t]={};
      typeCh.dom[t][ch]=(typeCh.dom[t][ch]||0)+1;
    }
    if(g==='국외'){
      types.for[t]=(types.for[t]||0)+1;
      if(!typeCh.for[t]) typeCh.for[t]={};
      typeCh.for[t][ch]=(typeCh.for[t][ch]||0)+1;
    }
  });

  const mkTypeArr = (tObj, tcObj, tot) => Object.entries(tObj).map(([name,cnt])=>{
    const top3 = Object.entries(tcObj[name]||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n])=>`${c}(${n})`).join(', ');
    return {name,cnt,pct:+(cnt/tot*100).toFixed(1),top3};
  }).sort((a,b)=>b.cnt-a.cnt).filter(t=>t.cnt>0);

  const typeTotal = Object.values(types.all).reduce((s,v)=>s+v,0)||1;
  const domTypeTotal = Object.values(types.dom).reduce((s,v)=>s+v,0)||1;
  const forTypeTotal = Object.values(types.for).reduce((s,v)=>s+v,0)||1;

  // 시간대
  const timeData = {};
  rows.forEach(r=>{
    const t = r['시간'];
    if(!t || !t.match(/\d{2}:\d{2}/)) return;
    const h = parseInt(t.split(':')[0]);
    if(h<12||h>20) return;
    const key = h+'시';
    if(!timeData[key]) timeData[key]={tot:0,dom:0,for:0};
    timeData[key].tot++;
    if(r['구분']==='국내') timeData[key].dom++;
    if(r['구분']==='국외') timeData[key].for++;
  });
  const hasTime = Object.keys(timeData).length > 0;
  const timeArr = TIME_HOURS.map(h=>({h, ...(timeData[h]||{tot:0,dom:0,for:0})}));

  const top1 = toArr(chAll, total)[0] || {name:'-',pct:0};

  return {
    total, domestic, foreign,
    top1_ch: top1.name, top1_pct: top1.pct,
    ch_all: toArr(chAll, total),
    ch_dom: toArr(chDom, domTotal),
    ch_for: toArr(chFor, forTotal),
    nat: natArr,
    types_all: mkTypeArr(types.all, typeCh.all, typeTotal),
    types_dom: mkTypeArr(types.dom, typeCh.dom, domTypeTotal),
    types_for: mkTypeArr(types.for, typeCh.for, forTypeTotal),
    hasTime, timeArr
  };
}

async function loadData() {
  document.getElementById('page-annual').innerHTML = '<div class="loading"><div class="spinner"></div>최신 데이터 불러오는 중...</div>';
  try {
    const res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    RAW = parseCSV(text);
    MONTHLY = buildMonthly(RAW);
    document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    buildSidebar();
    if (currentMonth) showPage('monthly', currentMonth);
    else renderAnnualPage();
  } catch(e) {
    document.getElementById('page-annual').innerHTML = '<div class="loading">데이터를 불러올 수 없습니다. 잠시 후 새로고침해 주세요.</div>';
  }
}

function buildSidebar() {
  const el = document.getElementById('sidebar-months');
  el.innerHTML = MONTHS_KR.map((name,i) => {
    const m = i+1;
    const key = `2026-${m}`;
    const has = MONTHLY[key];
    return `<button class="month-item ${has?'has-data':''} ${currentMonth===m?'active':''}" onclick="${has?`showPage('monthly',${m})`:''}">
      ${name} ${has?`<span class="month-badge">${MONTHLY[key].rows.length}건</span>`:''}
    </button>`;
  }).join('');
}

function showPage(page, month) {
  document.getElementById('page-annual').classList.toggle('hidden', page!=='annual');
  document.getElementById('page-monthly').classList.toggle('hidden', page!=='monthly');
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',i===(page==='annual'?0:1)));
  document.querySelectorAll('.main-item').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.month-item').forEach(t=>t.classList.remove('active'));

  if (page==='annual') {
    document.getElementById('sidebar-annual').classList.add('active');
    currentMonth = null;
    renderAnnualPage();
  } else {
    const m = month || Math.max(...Object.keys(MONTHLY).map(k=>parseInt(k.split('-')[1])));
    currentMonth = m;
    document.querySelectorAll('.month-item').forEach((el,i)=>{ if(i===m-1) el.classList.add('active'); });
    renderMonthlyPage(m);
  }
  buildSidebar();
}

function renderBars(id, chArr, tab, stats) {
  const el = document.getElementById(id);
  if(!el) return;
  const list = (tab==='dom'?stats.ch_dom:tab==='for'?stats.ch_for:stats.ch_all).slice(0,10);
  const max = Math.max(...list.map(d=>d.pct));
  el.innerHTML = list.map((d,i)=>`
    <div class="bar-row">
      <span class="bar-rank">${i+1}</span>
      <span class="bar-label" title="${d.name}">${d.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(d.pct/max*100).toFixed(1)}%;background:${d.color||'#888780'}"></div></div>
      <span class="bar-pct">${d.pct}%</span>
      <span class="bar-cnt">${d.cnt}건</span>
    </div>`).join('');
}

function renderNat(id, natArr, limit=8) {
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = natArr.slice(0,limit).map(n=>`
    <div class="nat-row"><span>${n.name}</span><span class="nat-val">${n.cnt}팀 · ${n.pct}%</span></div>`).join('');
}

function renderTypes(id, stats, tab) {
  const el = document.getElementById(id);
  if(!el) return;
  const list = tab==='dom'?stats.types_dom:tab==='for'?stats.types_for:stats.types_all;
  el.innerHTML = list.map(t=>`
    <div class="type-card">
      <div class="type-name">${t.name}</div>
      <div class="type-pct">${t.cnt}팀 · ${t.pct}%</div>
      <div class="type-top">TOP3: ${t.top3||'-'}</div>
    </div>`).join('');
}

function renderTime(id, timeArr) {
  const el = document.getElementById(id);
  if(!el) return;
  const max = Math.max(...timeArr.map(t=>t.tot),1);
  el.innerHTML = timeArr.map(t=>{
    const isPeak = t.tot===Math.max(...timeArr.map(x=>x.tot));
    const dH = Math.round(t.dom/max*85);
    const fH = Math.round(t.for/max*85);
    return `<div class="time-col">
      <div class="time-bar-wrap">
        <div style="width:10px;height:${dH}px;background:#378ADD;border-radius:2px 2px 0 0"></div>
        <div style="width:10px;height:${fH}px;background:#1D9E75;border-radius:2px 2px 0 0"></div>
      </div>
      <div class="time-lbl ${isPeak?'time-peak':''}">${t.h.replace('시','')}${isPeak?'<br>★':''}</div>
    </div>`;
  }).join('');
}

function destroyChart(id) {
  if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}
}

function renderTrendChart(monthKeys) {
  destroyChart('trendChart');
  const ctx = document.getElementById('trendChart');
  if(!ctx) return;
  const labels = monthKeys.map(k=>MONTHS_KR[parseInt(k.split('-')[1])-1]);
  const data = monthKeys.map(k=>MONTHLY[k].rows.length);
  const colors = monthKeys.map((_,i)=>i===monthKeys.length-1?'#185FA5':i===monthKeys.length-2?'#378ADD':'#B5D4F4');
  chartInstances['trendChart'] = new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'방문 건수',data,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:12}}}}}
  });
}

function setChTab(page, tab) {
  currentChTab[page] = tab;
  if(page==='annual'){
    const stats = calcStats(Object.keys(MONTHLY).flatMap(k=>MONTHLY[k].rows));

    renderBars('monthly-bars', null, tab, calcStats(MONTHLY[`2026-${currentMonth}`].rows));
  }
}
function setTypeTab(page, tab) {
  currentTypeTab[page] = tab;
  if(page==='annual'){
    const stats = calcStats(Object.keys(MONTHLY).flatMap(k=>MONTHLY[k].rows));
    renderTypes('annual-types', stats, tab);
  } else {
    renderTypes('monthly-types', calcStats(MONTHLY[`2026-${currentMonth}`].rows), tab);
  }
}

function openChModal(stats, tab, title) {
  const list = tab==='dom'?stats.ch_dom:tab==='for'?stats.ch_for:stats.ch_all;
  const max = Math.max(...list.map(d=>d.pct));
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-sub').textContent = `전체 ${list.length}개 채널 · 응답 ${list.reduce((s,d)=>s+d.cnt,0)}건`;
  document.getElementById('modal-content').innerHTML = `<div class="bar-list">${
    list.map((d,i)=>`
      <div class="bar-row">
        <span class="bar-rank">${i+1}</span>
        <span class="bar-label" title="${d.name}" style="width:90px">${d.name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(d.pct/max*100).toFixed(1)}%;background:${d.color||'#888780'}"></div></div>
        <span class="bar-pct">${d.pct}%</span>
        <span class="bar-cnt">${d.cnt}건</span>
      </div>`).join('')

  document.getElementById('modal-overlay').classList.remove('hidden');

function openNatModal(stats, title) {

  document.getElementById('modal-sub').textContent = `전체 ${list.length}개 국적 · 총 ${list.reduce((s,n)=>s+n.cnt,0)}건`;

    list.map((n,i)=>`
      <div class="nat-row">
        <span style="display:flex;align-items:center;gap:8px">

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('modal-overlay').classList.add('hidden'); });

// ===== 메모 분류 =====
const NAT_KW = ['한국','미국','프랑스','독일','영국','일본','중국','호주','캐나다','싱가포르','홍콩','타이완','필리핀','베트남','태국','인도네시아','말레이시아','러시아','이탈리아','폴란드','스페인','오스트리아','체코','덴마크','노르웨이','스웨덴','핀란드','그리스','포르투갈','터키','사우디아라비아','뉴질랜드','인도','시드니','런던','파리','베를린','도쿄','상하이','캘리포니아','동아시아','싱가폴','이란'];
const SKIP_EXACT = ['카카오맵','주렁주렁','네이버 예약','인터넷','internet'];

const MEMO_CATS = [
  {key:'workin', label:'🏪 워크인 상세', color:'cat-workin',
   test: m => /빈티지|간판|지나가다|걷다가|등신대|내려옴|근무지|위에 있다가/.test(m)},
  {key:'new', label:'🤖 신규 채널', color:'cat-new',
   test: m => /챗지피티|chat gpt|chatgpt|유튜브|트래볼루션|투어 어플|홍콩 투어|AI|인공지능/i.test(m)},
  {key:'viral', label:'💬 바이럴·특이', color:'cat-viral',
   test: m => /바이럴|베스트로|외국인 사이|홍대에오면|인스타.*틱톡|틱톡.*인스타|검색해봄|cat cafe|한분은|복합/.test(m)},
  {key:'return', label:'🔄 재방문 스토리', color:'cat-return',
   test: m => /년 전|년전|재방문|25년도|전에 방문/.test(m)},
  {key:'myeongdong', label:'🏢 명동점 연계', color:'cat-myeongdong',
   test: m => /명동|명동점/.test(m)},
];

function classifyMemo(memo) {
  for (const cat of MEMO_CATS) {
    if (cat.test(memo)) return cat;
  }
  return {key:'etc', label:'📝 기타', color:'cat-etc'};
}

function isMeaningfulMemo(memo) {
  if (!memo || !memo.trim()) return false;
  const m = memo.trim();
  if (SKIP_EXACT.includes(m)) return false;

  // 나라 키워드만 제거 후 남는 내용이 있는지 확인
  let temp = m;
  NAT_KW.forEach(k => { temp = temp.replace(new RegExp(k, 'gi'), ''); });
  // 숫자, 특수문자, 공백 제거
  temp = temp.replace(/[\d+/,·\s\-_()（）]/g, '').trim();

  // 나라명 제거 후 2글자 이상 남아야 의미있음
  if (temp.length < 2) return false;

  // 단순 혼합/혼합만 있는 경우 제외
  if (/^혼합$/.test(m)) return false;

  return true;
}

let memoFilterState = {};

function renderMemoSection(feedId, rows) {
  const isAnnual = feedId === 'annual-memos';
  const filterId = isAnnual ? 'annual-memo-filter' : 'monthly-memo-filter';
  const countId = isAnnual ? 'annual-memo-count' : 'monthly-memo-count';

  const memos = rows.filter(r => isMeaningfulMemo(r['메모'])).map(r => ({
    date: r['날짜'],
    nat: r['국가/지역'],
    gubn: r['구분'],
    ch: r['채널'],
    type: r['그룹유형'],
    memo: r['메모'].trim(),
    cat: classifyMemo(r['메모'].trim())
  })).sort((a,b) => b.date.localeCompare(a.date));

  if (!memoFilterState[feedId]) memoFilterState[feedId] = 'all';

  const catCounts = {};
  memos.forEach(m => { catCounts[m.cat.key] = (catCounts[m.cat.key]||0)+1; });

  const filterEl = document.getElementById(filterId);
  const countEl = document.getElementById(countId);
  if (countEl) countEl.textContent = `총 ${memos.length}건`;

  const activeCats = [{key:'all', label:'전체'}, ...MEMO_CATS, {key:'etc', label:'📝 기타'}]
    .filter(c => c.key==='all' || catCounts[c.key]);

  // memos를 전역에 저장해서 필터 버튼에서 접근
  window._memoData = window._memoData || {};
  window._memoData[feedId] = memos;

  filterEl.innerHTML = activeCats.map(c => `
    <button class="memo-filter-btn ${memoFilterState[feedId]===c.key?'active':''}"
      onclick="setMemoFilter('${feedId}','${filterId}','${c.key}')"
    >${c.label} ${c.key!=='all'?`(${catCounts[c.key]||0})`:`(${memos.length})`}</button>
  `).join('');

  renderMemoFeed(feedId, memos, memoFilterState[feedId]);
}

function setMemoFilter(feedId, filterId, key) {
  memoFilterState[feedId] = key;
  document.querySelectorAll(`#${filterId} .memo-filter-btn`).forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${key}'`));
  });
  const memos = window._memoData[feedId] || [];
  renderMemoFeed(feedId, memos, key);
}

function renderMemoFeed(feedId, memos, filter) {
  const el = document.getElementById(feedId);
  if (!el) return;
  const filtered = filter==='all' ? memos : memos.filter(m=>m.cat.key===filter);
  if (!filtered.length) {
    el.innerHTML = '<p style="color:var(--gray-500);font-size:13px;padding:12px 0">해당 카테고리 메모가 없어요.</p>';
    return;
  }
  el.innerHTML = filtered.map(m => `
    <div class="memo-item ${m.cat.color}">
      <div class="memo-top">
        <span class="memo-cat-badge ${m.cat.color}">${m.cat.label}</span>
        <span class="memo-date">${m.date}</span>
        <span class="memo-meta">${m.gubn} · ${m.nat} · ${m.type} · ${m.ch}</span>
      </div>
      <div class="memo-text">${m.memo}</div>
    </div>`).join('');
}

loadData();
</script>
</body>
</html>
