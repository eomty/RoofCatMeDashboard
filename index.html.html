<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-dark: #0C447C;
    --blue-mid: #185FA5;
    --blue-light: #378ADD;
    --blue-pale: #E6F1FB;
    --green-dark: #27500A;
    --green-mid: #3B6D11;
    --green-pale: #EAF3DE;
    --pink-mid: #993556;
    --amber-mid: #BA7517;
    --amber-pale: #FAEEDA;
    --gray-900: #1a1a18;
    --gray-700: #444441;
    --gray-500: #888780;
    --gray-300: #d3d1c7;
    --gray-100: #f1efe8;
    --white: #ffffff;
    --border: rgba(0,0,0,0.08);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --nav-h: 54px;
    --sidebar-w: 220px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--gray-100);
    color: var(--gray-900);
    font-size: 14px;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 20px; z-index: 100;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600; color: var(--gray-900);
    text-decoration: none;
  }
  .nav-dot { width: 8px; height: 8px; background: var(--blue-mid); border-radius: 50%; flex-shrink: 0; }
  .nav-divider { width: 1px; height: 18px; background: var(--border); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 5px 14px; border-radius: var(--radius-sm); font-size: 13px;
    border: none; background: transparent; color: var(--gray-500);
    cursor: pointer; font-family: inherit; font-weight: 400; transition: all .15s;
  }
  .nav-tab:hover { background: var(--gray-100); color: var(--gray-900); }
  .nav-tab.active { background: var(--blue-pale); color: var(--blue-dark); font-weight: 500; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .upload-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: var(--radius-sm);
    background: var(--blue-mid); color: white; border: none;
    font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  .upload-btn:hover { background: var(--blue-dark); }

  /* LAYOUT */
  .layout { display: flex; padding-top: var(--nav-h); min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    position: fixed; top: var(--nav-h); bottom: 0; left: 0;
    background: var(--white); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 20px 12px;
  }
  .sidebar-section-title {
    font-size: 10px; font-weight: 600; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: .06em;
    padding: 0 8px; margin: 16px 0 6px;
  }
  .sidebar-section-title:first-child { margin-top: 0; }
  .month-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; color: var(--gray-500); transition: all .15s;
    margin-bottom: 2px; border: none; background: transparent;
    width: 100%; text-align: left; font-family: inherit;
  }
  .month-item:hover { background: var(--gray-100); color: var(--gray-900); }
  .month-item.has-data { color: var(--gray-900); }
  .month-item.active { background: var(--blue-pale); color: var(--blue-dark); font-weight: 500; }
  .month-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 10px;
    background: var(--green-pale); color: var(--green-dark);
  }
  .month-item.active .month-badge { background: var(--blue-mid); color: white; }
  .main-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--gray-900);
    transition: all .15s; margin-bottom: 4px;
    border: none; background: transparent; width: 100%;
    text-align: left; font-family: inherit;
  }
  .main-item:hover { background: var(--gray-100); }
  .main-item.active { background: var(--blue-pale); color: var(--blue-dark); }

  /* MAIN CONTENT */
  .content { margin-left: var(--sidebar-w); flex: 1; padding: 28px 28px; min-width: 0; }

  /* PAGE HEADER */
  .page-header { margin-bottom: 24px; }
  .page-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
  }
  .page-badge.annual { background: var(--blue-pale); color: var(--blue-dark); }
  .page-badge.monthly { background: var(--green-pale); color: var(--green-dark); }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--gray-500); }
  .month-nav { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .month-nav-btn {
    padding: 4px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: white; font-size: 12px; cursor: pointer; font-family: inherit;
    color: var(--gray-700); transition: all .15s;
  }
  .month-nav-btn:hover:not(:disabled) { background: var(--gray-100); }
  .month-nav-btn:disabled { opacity: .35; cursor: default; }
  .month-nav-current { font-size: 14px; font-weight: 500; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric-card {
    background: var(--white); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 16px 18px;
  }
  .metric-label { font-size: 11px; color: var(--gray-500); margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 600; line-height: 1.1; margin-bottom: 2px; }
  .metric-note { font-size: 11px; color: var(--gray-500); }
  .metric-up { color: var(--green-mid); font-size: 11px; }
  .metric-down { color: #E24B4A; font-size: 11px; }

  /* GRID */
  .grid { display: grid; gap: 16px; margin-bottom: 16px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 2fr 1fr 1fr; }
  .span-2 { grid-column: span 2; }

  /* CARD */
  .card {
    background: var(--white); border-radius: var(--radius-lg);
    border: 1px solid var(--border); padding: 20px 22px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; }

  /* TABS */
  .tab-group { display: flex; gap: 3px; }
  .tab-btn {
    padding: 4px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: transparent; font-size: 12px; cursor: pointer; font-family: inherit;
    color: var(--gray-500); transition: all .15s;
  }
  .tab-btn:hover { background: var(--gray-100); }
  .tab-btn.active { background: var(--blue-pale); color: var(--blue-dark); border-color: transparent; font-weight: 500; }

  /* BAR CHART */
  .bar-list { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-rank { font-size: 10px; color: var(--gray-500); width: 14px; text-align: right; flex-shrink: 0; }
  .bar-label { font-size: 12px; color: var(--gray-900); width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 7px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .bar-pct { font-size: 12px; color: var(--gray-500); width: 38px; text-align: right; flex-shrink: 0; }
  .bar-cnt { font-size: 11px; color: var(--gray-300); width: 32px; text-align: right; flex-shrink: 0; }

  /* NATIONALITY */
  .nat-list { display: flex; flex-direction: column; gap: 0; }
  .nat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--gray-100); font-size: 12px; }
  .nat-row:last-child { border-bottom: none; }
  .nat-name { color: var(--gray-900); }
  .nat-val { color: var(--gray-500); }

  /* VISIT TYPE */
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-card { background: var(--gray-100); border-radius: var(--radius-sm); padding: 12px 14px; }
  .type-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .type-pct { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
  .type-top { font-size: 11px; color: var(--gray-500); line-height: 1.5; }

  /* TREND CHART */
  .trend-section { display: flex; flex-direction: column; gap: 6px; }
  .trend-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
  .trend-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .trend-bar-wrap { display: flex; align-items: flex-end; gap: 2px; width: 100%; }
  .trend-bar { border-radius: 3px 3px 0 0; transition: height .5s ease; }
  .trend-month { font-size: 10px; color: var(--gray-500); text-align: center; }
  .trend-count { font-size: 10px; color: var(--gray-500); text-align: center; }

  /* TIME CHART */
  .time-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; }
  .time-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .time-bar-wrap { display: flex; align-items: flex-end; gap: 1px; width: 100%; justify-content: center; }
  .time-lbl { font-size: 9px; color: var(--gray-500); }
  .time-peak { color: var(--amber-mid); font-weight: 600; }
  .time-legend { display: flex; gap: 12px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--gray-500); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* INSIGHT */
  .insight-list { display: flex; flex-direction: column; gap: 0; }
  .insight-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 12px; line-height: 1.6; align-items: flex-start; }
  .insight-row:last-child { border-bottom: none; }
  .insight-icon { color: var(--blue-mid); flex-shrink: 0; font-size: 14px; margin-top: 1px; }
  strong { font-weight: 600; }

  /* MONTH CALENDAR (main page) */
  .month-calendar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .cal-month {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 6px; text-align: center; cursor: pointer;
    transition: all .15s; background: var(--white);
  }
  .cal-month:hover { border-color: var(--blue-light); }
  .cal-month.has-data { border-color: var(--blue-light); background: var(--blue-pale); }
  .cal-month.no-data { cursor: default; opacity: .5; }
  .cal-month-name { font-size: 12px; font-weight: 500; color: var(--blue-dark); }
  .cal-month.no-data .cal-month-name { color: var(--gray-500); }
  .cal-count { font-size: 10px; color: var(--blue-mid); margin-top: 2px; }
  .cal-month.no-data .cal-count { color: var(--gray-300); }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--gray-300); border-radius: var(--radius-md);
    padding: 24px; text-align: center; transition: all .15s;
    cursor: pointer;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--blue-mid); background: var(--blue-pale); }
  .upload-zone-title { font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 4px; }
  .upload-zone-sub { font-size: 11px; color: var(--gray-500); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .content { margin-left: 0; padding: 16px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .span-2 { grid-column: span 1; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    nav { padding: 0 16px; }
    .nav-tabs { display: none; }
  }
  @media (max-width: 480px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .month-calendar { grid-template-columns: repeat(4, 1fr); }
  }

  /* UTILS */
  .hidden { display: none !important; }
  .text-muted { color: var(--gray-500); }
  .divider { border: none; border-top: 1px solid var(--gray-100); margin: 20px 0; }
</style>
</head>

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function getAnnualData() {
  const months = Object.keys(DATA).map(Number);
  const total = months.reduce((s,m) => s + DATA[m].total, 0);
  const ch_total = months.reduce((s,m) => s + DATA[m].ch_total, 0);
  const domestic = months.reduce((s,m) => s + DATA[m].domestic, 0);
  const foreign = months.reduce((s,m) => s + DATA[m].foreign, 0);

  const allCh = {};
  months.forEach(m => {
    DATA[m].ch_all.forEach(c => {
      if (!allCh[c.name]) allCh[c.name] = {name:c.name, cnt:0, color:c.color};
      allCh[c.name].cnt += c.cnt;
    });
  });
  const chSorted = Object.values(allCh).sort((a,b)=>b.cnt-a.cnt).map(c=>({...c,pct:+(c.cnt/ch_total*100).toFixed(1)}));

  const domCh = {};
  months.forEach(m => {
    DATA[m].ch_dom.forEach(c => {
      if (!domCh[c.name]) domCh[c.name] = {name:c.name, cnt:0, color:c.color};
      domCh[c.name].cnt += c.cnt;
    });
  });
  const domChTotal = Object.values(domCh).reduce((s,c)=>s+c.cnt,0);
  const domChSorted = Object.values(domCh).sort((a,b)=>b.cnt-a.cnt).map(c=>({...c,pct:+(c.cnt/domChTotal*100).toFixed(1)}));

  const forCh = {};
  months.forEach(m => {
    DATA[m].ch_for.forEach(c => {
      if (!forCh[c.name]) forCh[c.name] = {name:c.name, cnt:0, color:c.color};
      forCh[c.name].cnt += c.cnt;
    });
  });
  const forChTotal = Object.values(forCh).reduce((s,c)=>s+c.cnt,0);
  const forChSorted = Object.values(forCh).sort((a,b)=>b.cnt-a.cnt).map(c=>({...c,pct:+(c.cnt/forChTotal*100).toFixed(1)}));

  const natMerged = {};
  months.forEach(m => {
    DATA[m].nat.forEach(n => {
      if (!natMerged[n.name]) natMerged[n.name] = {name:n.name, cnt:0};
      natMerged[n.name].cnt += n.cnt;
    });
  });
  const natSorted = Object.values(natMerged).sort((a,b)=>b.cnt-a.cnt).map(n=>({...n,pct:+(n.cnt/total*100).toFixed(1)}));

  const top1 = chSorted[0];
  return {total,ch_total,domestic,foreign,top1_ch:top1.name,top1_pct:top1.pct,
    ch_all:chSorted,ch_dom:domChSorted,ch_for:forChSorted,nat:natSorted};
}

function renderBars(containerId, data, tab) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const list = tab==='dom' ? data.ch_dom : tab==='for' ? data.ch_for : data.ch_all;
  const top = list.slice(0,10);
  const maxPct = Math.max(...top.map(d=>d.pct));
  container.innerHTML = top.map((d,i) => `
    <div class="bar-row">
      <span class="bar-rank">${i+1}</span>
      <span class="bar-label" title="${d.name}">${d.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(d.pct/maxPct*100).toFixed(1)}%;background:${d.color}"></div></div>
      <span class="bar-pct">${d.pct.toFixed(1)}%</span>
      <span class="bar-cnt">${d.cnt}건</span>
    </div>`).join('');
}

function renderNat(containerId, nat, limit=8) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = nat.slice(0,limit).map(n=>`
    <div class="nat-row">
      <span class="nat-name">${n.name}</span>
      <span class="nat-val">${n.cnt}팀 · ${n.pct.toFixed(1)}%</span>
    </div>`).join('');
}

function renderTypes(containerId, data, tab) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const list = tab==='dom' ? data.types_dom : tab==='for' ? data.types_for : data.types_all;
  el.innerHTML = list.map(t=>`
    <div class="type-card">
      <div class="type-name">${t.name}</div>
      <div class="type-pct">${t.cnt}팀 · ${t.pct.toFixed(1)}%</div>
      <div class="type-top">TOP3: ${t.top}</div>
    </div>`).join('');
}

function renderTime(containerId, timeData) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const maxTot = Math.max(...timeData.map(t=>t.tot));
  el.innerHTML = timeData.map(t => {
    const dH = Math.round(t.dom/maxTot*85);
    const fH = Math.round(t.for/maxTot*85);
    return `<div class="time-col">
      <div class="time-bar-wrap">
        <div style="width:10px;height:${dH}px;background:#378ADD;border-radius:2px 2px 0 0"></div>
        <div style="width:10px;height:${fH}px;background:#1D9E75;border-radius:2px 2px 0 0"></div>
      </div>
      <div class="time-lbl ${t.peak?'time-peak':''}">${t.h.replace('시','')}<br>${t.peak?'★':''}</div>
    </div>`;
  }).join('');
}

function renderInsights(containerId, insights) {
  const el = document.getElementById(containerId);

  el.innerHTML = insights.map(i=>`
    <div class="insight-row">
      <span class="insight-icon">·</span>
      <span>${i}</span>

}

    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11}}},
        x:{grid:{display:false},ticks:{font:{size:12}}}
      }
    }
  });
}

function showPage(page, month, btn) {
  document.getElementById('page-annual').classList.toggle('hidden', page!=='annual');
  document.getElementById('page-monthly').classList.toggle('hidden', page!=='monthly');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.main-item').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.month-item').forEach(t=>t.classList.remove('active'));

  if (page==='annual') {
    document.querySelectorAll('.nav-tab')[0].classList.add('active');
    document.getElementById('sidebar-annual').classList.add('active');
    renderAnnualPage();
  } else {
    document.querySelectorAll('.nav-tab')[1].classList.add('active');
    const m = month || Math.max(...Object.keys(DATA).map(Number));
    currentMonth = m;
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.month-item').forEach(el => {
      if (parseInt(el.dataset.month) === m) el.classList.add('active');
    });
    renderMonthlyPage(m);
  }
}

function renderAnnualPage() {

      </div>
      <div class="metric-card">
        <div class="metric-label">외국인 방문객</div>
        <div class="metric-value">${(annual.foreign/annual.total*100).toFixed(1)}%</div>

      <div class="card">
        <div class="card-header">

        </div>
        <div class="month-calendar">
          ${MONTHS.map((name,i)=>{
            const m = i+1;
            const has = DATA[m];
            return `<div class="cal-month ${has?'has-data':'no-data'}" onclick="${has?`showPage('monthly',${m})`:''}">
              <div class="cal-month-name">${name}</div>
              <div class="cal-count">${has?DATA[m].total+'팀':'—'}</div>
            </div>`;
          }).join('')}

      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="card-header">
          <span class="card-title">유입 채널 누계</span>
          <div class="tab-group">
            <button class="tab-btn ${tab==='all'?'active':''}" onclick="setChTab('annual','all')">전체</button>
            <button class="tab-btn ${tab==='dom'?'active':''}" onclick="setChTab('annual','dom')">국내</button>
            <button class="tab-btn ${tab==='for'?'active':''}" onclick="setChTab('annual','for')">국외</button>

        </div>
        <div class="bar-list" id="annual-bars"></div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">월별 방문 추이</span></div>
        <div style="position:relative;height:200px;">
          <canvas id="trendChart" role="img" aria-label="월별 방문객 추이 막대 차트"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">국적 구성 누계 상위 10</span></div>
        <div class="nat-list" id="annual-nat"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">방문 유형 누계</span>
          <div class="tab-group">
            <button class="tab-btn ${ttab==='all'?'active':''}" onclick="setTypeTab('annual','all')">전체</button>

function renderAnnualTypes(annual, tab) {
  const months = Object.keys(DATA).map(Number);
  const merge = (key) => {
    const merged = {};
    months.forEach(m => {
      (DATA[m][key]||[]).forEach(t=>{
        if(!merged[t.name]) merged[t.name]={name:t.name,cnt:0,top:t.top};
        merged[t.name].cnt+=t.cnt;
      });
    });
    const total = Object.values(merged).reduce((s,t)=>s+t.cnt,0);
    return Object.values(merged).sort((a,b)=>b.cnt-a.cnt).map(t=>({...t,pct:+(t.cnt/total*100).toFixed(1)}));
  };
  const fakeData = {
    types_all: merge('types_all'),
    types_dom: merge('types_dom'),
    types_for: merge('types_for'),
  };
  renderTypes('annual-types', fakeData, tab);
}

  const d = DATA[m];
  const months = Object.keys(DATA).map(Number).sort();
  const idx = months.indexOf(m);
  const prevM = months[idx-1];
  const nextM = months[idx+1];
  const growth = prevM ? (((d.total-DATA[prevM].total)/DATA[prevM].total)*100).toFixed(1) : null;
  const tab = currentChTab.monthly;
  const ttab = currentTypeTab.monthly;
  const container = document.getElementById('page-monthly');

  container.innerHTML = `
    <div class="page-header">
      <span class="page-badge monthly">${d.label} 상세</span>
      <h1 class="page-title">${d.label} 방문객 유입경로</h1>
      <p class="page-sub">${d.period} · ${d.total}팀 응답 · 채널 응답 ${d.ch_total}건</p>
      <div class="month-nav">
        <button class="month-nav-btn" onclick="showPage('monthly',${prevM})" ${!prevM?'disabled':''}>← ${prevM?DATA[prevM].label:'이전'}</button>
        <span class="month-nav-current">${d.label}</span>
        <button class="month-nav-btn" onclick="showPage('monthly',${nextM})" ${!nextM?'disabled':''}>→ ${nextM?DATA[nextM].label:'다음'}</button>

    </div>

        <div class="metric-note">채널 응답 ${d.ch_total}건</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">국내</div>
        <div class="metric-value">${(d.domestic/d.total*100).toFixed(1)}%</div>

      <div class="metric-card">
        <div class="metric-label">국외</div>
        <div class="metric-value">${(d.foreign/d.total*100).toFixed(1)}%</div>
        <div class="metric-note">${d.foreign}팀</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">1위 채널</div>
        <div class="metric-value">${d.top1_ch}</div>
        <div class="metric-note">${d.top1_pct}%</div>
      </div>
      ${growth!==null?`
      <div class="metric-card">
        <div class="metric-label">전월 대비</div>
        <div class="metric-value">${d.total}</div>
        <div class="metric-note ${growth>0?'metric-up':'metric-down'}">${growth>0?'▲':'▼'} ${Math.abs(growth)}%</div>
      </div>`:''}
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="card-header">
          <span class="card-title">유입 채널 분석</span>
          <div class="tab-group">
            <button class="tab-btn ${tab==='all'?'active':''}" onclick="setChTab('monthly','all')">전체</button>
            <button class="tab-btn ${tab==='dom'?'active':''}" onclick="setChTab('monthly','dom')">국내</button>
            <button class="tab-btn ${tab==='for'?'active':''}" onclick="setChTab('monthly','for')">국외</button>
          </div>
        </div>
        <div class="bar-list" id="monthly-bars"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">국적 구성 상위 8</span>
        </div>
        <div class="nat-list" id="monthly-nat"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">방문 유형 분석</span>
          <div class="tab-group">
            <button class="tab-btn ${ttab==='all'?'active':''}" onclick="setTypeTab('monthly','all')">전체</button>
            <button class="tab-btn ${ttab==='dom'?'active':''}" onclick="setTypeTab('monthly','dom')">국내</button>
            <button class="tab-btn ${ttab==='for'?'active':''}" onclick="setTypeTab('monthly','for')">국외</button>
          </div>
        </div>
        <div class="type-grid" id="monthly-types"></div>
      </div>

      ${d.has_time ? `
      <div class="card">
        <div class="card-header"><span class="card-title">시간대별 방문 (5/20–31 기준)</span></div>
        <div class="time-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>국내</div>
          <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>국외</div>
        </div>
        <div class="time-chart" id="monthly-time"></div>

      <div class="card" style="display:flex;align-items:center;justify-content:center;min-height:160px;">
        <p style="color:var(--gray-500);font-size:13px;text-align:center">시간대 데이터는 5월부터 수집 시작<br><span style="font-size:11px">5월 이후 월에 자동 표시됩니다</span></p>

  renderBars('monthly-bars', d, tab);

function setChTab(page, tab) {
  currentChTab[page] = tab;
  if (page==='annual') {
    const annual = getAnnualData();
    renderBars('annual-bars', annual, tab);
    document.querySelectorAll('#page-annual .tab-btn').forEach(b=>{
      if(b.textContent==='전체') b.classList.toggle('active',tab==='all');
      if(b.textContent==='국내') b.classList.toggle('active',tab==='dom');
      if(b.textContent==='국외') b.classList.toggle('active',tab==='for');
    });
  } else {
    renderBars('monthly-bars', DATA[currentMonth], tab);
    const btns = document.querySelectorAll('#page-monthly .card:first-child .tab-btn');
    btns.forEach(b=>{
      if(b.textContent==='전체') b.classList.toggle('active',tab==='all');
      if(b.textContent==='국내') b.classList.toggle('active',tab==='dom');
      if(b.textContent==='국외') b.classList.toggle('active',tab==='for');
    });
  }
}

function setTypeTab(page, tab) {
  currentTypeTab[page] = tab;
  if (page==='annual') {
    const annual = getAnnualData();
    renderAnnualTypes(annual, tab);
  } else {
    renderTypes('monthly-types', DATA[currentMonth], tab);
  }
}

function buildSidebar() {
  const el = document.getElementById('sidebar-months');
  el.innerHTML = MONTHS.map((name,i) => {
    const m = i+1;
    const has = DATA[m];
    return `<button class="month-item ${has?'has-data':''}"
      data-month="${m}"
      onclick="${has?`showPage('monthly',${m})`:''}">
      ${name}
      ${has?`<span class="month-badge">${DATA[m].total}팀</span>`:''}
    </button>`;
  }).join('');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) {
    alert(`"${file.name}" 업로드 확인!\n\n실제 배포 환경에서 CSV 파싱 후 자동 반영됩니다.\n현재는 데이터가 코드에 하드코딩되어 있어요.`);
  }
}

function handleCSV(e) {
  const file = e.target.files[0];
  if (file) alert(`"${file.name}" 선택됨!\n\n실제 배포 환경에서 자동 파싱·반영됩니다.`);
}

buildSidebar();
renderAnnualPage();
</script>
